<!DOCTYPE html>
<html>
<head>
    <title>AI Email Generator</title>
    <style>
        body { font-family: Arial; margin: 50px; }
        input, button { padding: 10px; margin: 5px; }
        textarea { width: 100%; height: 250px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>AI Email Generator</h2>
    <input type="text" id="topic" placeholder="Enter email topic">
    <button onclick="generateEmail()">Generate Email</button>
    <h3>Generated Email:</h3>
    <textarea id="result" readonly></textarea>

    <script>
        async function generateEmail() {
            const topic = document.getElementById("topic").value;
            const response = await fetch(`http://localhost:8080/api/email/generate?topic=${encodeURIComponent(topic)}`, {
                method: 'POST'
            });
            const email = await response.text();
            document.getElementById("result").value = email;
        }
    </script>
</body>
</html>
